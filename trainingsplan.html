<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fitti – Trainingsplan Generator</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff3b6b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000; --surface: #0d0d0d; --surface2: #141414;
      --border: #202020; --text: #fff; --muted: #4a4a4a; --muted2: #777;
      --pink: #ff3b6b; --pink-dim: rgba(255,59,107,0.1);
      --accent: #ff3b6b; --accent-dim: rgba(255,59,107,0.1);
      --green: #22c55e; --amber: #f59e0b; --blue: #60a5fa; --purple: #a78bfa;
    }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 80px 12px 105px; -webkit-font-smoothing: antialiased; }
    h1,h2,h3 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
    .page { max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; gap: 80px; }

    /* ── CARD ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .card-header { padding: 16px 20px 0; display: flex; align-items: center; justify-content: space-between; }
    .card-tag { font-size: 0.6rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted2); display: flex; align-items: center; gap: 6px; }
    .card-tag::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--accent); flex-shrink:0; }
    .card-body { padding: 10px 16px 16px; }
    .card-title { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 6px; }
    .card-title span { color: var(--pink); }
    .card-sub { font-size: 0.74rem; color: var(--muted2); line-height: 1.6; }

    /* ── PROGRESS ── */
    .progress-wrap { padding: 16px 20px 0; }
    .progress-bar-bg { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s ease; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.68rem; color: var(--muted2); margin-top: 7px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── QUIZ ── */
    .question-wrap { padding: 11px 16px 16px; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .question-wrap { animation: fadeUp 0.3s ease both; }
    .q-num { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--accent); margin-bottom: 8px; font-weight: 600; }
    .q-text { font-size: clamp(1.1rem, 3vw, 1.4rem); font-weight: 700; letter-spacing: -0.03em; margin-bottom: 6px; line-height: 1.2; }
    .q-hint { font-size: 0.8rem; color: var(--muted2); margin-bottom: 20px; line-height: 1.5; }

    .options-grid { display: flex; flex-direction: column; gap: 6px; }
    .options-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .option-btn {
      display: flex; align-items: center; gap: 12px; padding: 10px 13px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: left; width: 100%;
      font-family: 'Space Grotesk', sans-serif; color: var(--muted2);
      transition: border-color 0.12s, background 0.12s, color 0.12s;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .option-btn:hover { border-color: #333; color: #fff; }
    .option-btn.selected { border-color: var(--accent); color: #fff; background: var(--accent-dim); }
    .option-icon { font-size: 1.2rem; flex-shrink: 0; }
    .option-label { font-weight: 600; font-size: 0.84rem; }
    .option-desc { font-size: 0.7rem; color: var(--muted2); margin-top: 1px; }
    .option-btn.selected .option-desc { color: rgba(255,255,255,0.45); }
    .multi-hint { font-size: 0.68rem; color: var(--pink); margin-bottom: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }

    .nav-btns { display: flex; gap: 10px; margin-top: 20px; }
    .btn-back { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-family: 'Space Grotesk', sans-serif; font-size: 0.84rem; font-weight: 500; cursor: pointer; color: var(--muted2); transition: all 0.2s; }
    .btn-back:hover { color: #fff; border-color: #333; }
    .btn-next { flex: 1; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-family: 'Space Grotesk', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.2s; opacity: 0.4; }
    .btn-next.ready { opacity: 1; color: var(--muted2); }
    .btn-next.ready:hover { color: #fff; border-color: #333; }
    .btn-next.generate { background: var(--pink); color: #fff; border-color: transparent; opacity: 1; box-shadow: 0 0 20px rgba(255,59,107,0.25); }
    .btn-next.generate:hover { background: #e0284f; }

    /* ── RESULT ── */
    #result-section { display: none; flex-direction: column; gap: 80px; }

    .result-badge { display: inline-block; font-size: 0.62rem; font-weight: 600; padding: 3px 11px; border-radius: 100px; background: var(--pink-dim); color: var(--pink); border: 1px solid rgba(255,59,107,0.2); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.08em; }
    .result-name { font-size: clamp(1.4rem, 3.5vw, 2rem); font-weight: 700; letter-spacing: -0.04em; line-height: 1.05; margin-bottom: 12px; }
    .result-name span { color: var(--pink); }
    .result-desc { font-size: 0.84rem; color: var(--muted2); line-height: 1.7; margin-bottom: 20px; }
    .result-stats { display: grid; grid-template-columns: repeat(3,1fr); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .r-stat { padding: 16px 18px; border-right: 1px solid var(--border); }
    .r-stat:last-child { border-right: none; }
    .r-stat-val { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.03em; color: var(--pink); }
    .r-stat-label { font-size: 0.62rem; color: var(--muted2); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }

    /* WEEK */
    .week-grid { display: flex; flex-direction: column; }
    .week-day { display: flex; align-items: center; gap: 80px; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .week-day:last-child { border-bottom: none; }
    .day-name { font-weight: 700; font-size: 0.72rem; min-width: 32px; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.06em; }
    .day-label { flex: 1; font-size: 0.84rem; font-weight: 500; color: var(--muted2); }
    .week-day[data-type="train"] .day-label { color: #fff; }
    .day-badge { font-size: 0.62rem; font-weight: 600; padding: 3px 9px; border-radius: 100px; text-transform: uppercase; letter-spacing: 0.04em; flex-shrink: 0; }
    .badge-train { background: var(--pink-dim); color: var(--pink); }
    .badge-rest  { background: var(--surface2); color: var(--muted2); }

    /* EXERCISES */
    .ex-tag { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted2); font-weight: 600; margin-bottom: 4px; }
    .ex-title { font-size: 1rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 16px; }
    .ex-table { width: 100%; border-collapse: collapse; }
    .ex-table th { text-align: left; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 0 10px 10px 0; border-bottom: 1px solid var(--border); font-weight: 600; }
    .ex-table th:last-child { display: none; }
    .ex-table td { padding: 9px 8px 9px 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; color: var(--muted2); vertical-align: top; }
    .ex-table td:last-child { display: none; }
    .ex-table tr:last-child td { border-bottom: none; }
    .ex-table tr.ex-desc-row:last-child td { border-bottom: none; }
    .ex-table td:first-child { color: #fff; font-weight: 500; }
    .ex-num { font-size: 0.6rem; color: var(--muted); font-weight: 600; margin-right: 6px; }
    .mtag { font-size: 0.62rem; padding: 2px 7px; border-radius: 100px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted2); display: inline-block; margin: 2px 2px 0 0; }

    /* ── EXERCISE DESCRIPTIONS ── */
    .ex-desc-row { display: none; }
    .ex-desc-row.open { display: table-row; }
    .ex-desc-row td { padding: 2px 10px 10px 28px !important; font-size: 0.74rem !important; color: var(--muted2) !important; line-height: 1.5; font-weight: 400 !important; }
    .ex-info-btn { cursor: pointer; color: var(--muted); font-size: 0.68rem; margin-left: 5px; opacity: 0.4; transition: opacity 0.2s; display: inline-block; }
    .ex-info-btn:hover { opacity: 1; color: var(--accent); }

    /* ── EXERCISE SWAP ── */
    .ex-name-wrap { display: inline-flex; align-items: center; gap: 0; position: relative; }
    .ex-swap-icon { cursor: pointer; opacity: 0; transition: opacity 0.2s; font-size: 0.68rem; color: var(--accent); margin-left: 6px; }
    tr:hover .ex-swap-icon { opacity: 0.5; }
    .ex-swap-icon:hover { opacity: 1 !important; }
    .swap-dropdown { position: absolute; z-index: 50; top: 100%; left: 0; margin-top: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; min-width: 220px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); animation: fadeUp 0.15s ease both; }
    .swap-option { padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; color: var(--muted2); transition: all 0.15s; display: flex; justify-content: space-between; align-items: center; }
    .swap-option:hover { background: var(--surface2); color: #fff; }
    .swap-option-muscles { font-size: 0.62rem; color: var(--muted); }

    /* ── WARMUP ── */
    .warmup-section { border-bottom: 1px solid var(--border); margin-bottom: 12px; }
    .warmup-toggle { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 10px 0; background: none; border: none; color: var(--muted2); font-family: 'Space Grotesk', sans-serif; font-size: 0.78rem; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em; }
    .warmup-toggle:hover { color: #fff; }
    .warmup-chevron { transition: transform 0.2s; font-size: 0.7rem; }
    .warmup-section.open .warmup-chevron { transform: rotate(90deg); }
    .warmup-list { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .warmup-section.open .warmup-list { max-height: 400px; }
    .warmup-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 0.78rem; color: var(--muted2); }
    .warmup-item-name { color: #fff; font-weight: 500; }
    .warmup-item-dur { color: var(--accent); font-weight: 600; font-size: 0.72rem; }

    /* ── SUPERSET ── */
    .superset-group { position: relative; }
    .superset-group td:first-child { border-left: 2px solid var(--accent); padding-left: 10px !important; }
    .superset-badge { display: inline-block; font-size: 0.52rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); padding: 1px 6px; background: var(--accent-dim); border-radius: 4px; margin-left: 6px; vertical-align: middle; }

    /* ── PROGRESSION TRACKER ── */
    .progress-indicator { font-size: 0.64rem; color: var(--green); font-weight: 600; margin-left: 6px; cursor: pointer; }
    .progress-form-row { display: none; }
    .progress-form-row.open { display: table-row; }
    .progress-form-row td { padding: 6px 0 10px 28px !important; }
    .progress-form { display: flex; align-items: center; gap: 8px; }
    .pf-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; width: 70px; color: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 0.82rem; -moz-appearance: textfield; }
    .pf-input::-webkit-outer-spin-button, .pf-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .pf-input:focus { border-color: #333; outline: none; }
    .pf-save { background: var(--accent-dim); border: 1px solid rgba(255,59,107,0.2); color: var(--accent); border-radius: 8px; padding: 8px 12px; cursor: pointer; font-weight: 700; font-family: 'Space Grotesk', sans-serif; font-size: 0.82rem; transition: all 0.2s; }
    .pf-save:hover { background: rgba(255,59,107,0.2); }
    .progress-history { font-size: 0.68rem; color: var(--muted2); padding: 4px 0 0; line-height: 1.6; }

    /* ── DELOAD ── */
    .deload-hint { border-color: rgba(245,158,11,0.3) !important; background: rgba(245,158,11,0.03) !important; }
    .deload-body { display: flex; align-items: flex-start; gap: 12px; }
    .deload-text h4 { font-size: 0.88rem; margin-bottom: 4px; }
    .deload-text p { font-size: 0.78rem; color: var(--muted2); line-height: 1.5; }
    .btn-dismiss-deload { background: none; border: none; color: var(--muted2); font-size: 1.2rem; cursor: pointer; padding: 4px; flex-shrink: 0; line-height: 1; }
    .btn-dismiss-deload:hover { color: #fff; }

    /* ── TIMER ── */
    .timer-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; flex-direction: column; }
    .timer-overlay.active { display: flex; }
    .timer-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted2); margin-bottom: 8px; font-weight: 600; }
    .timer-display { font-size: 4rem; font-weight: 700; letter-spacing: -0.04em; color: var(--accent); font-variant-numeric: tabular-nums; }
    .timer-bar-bg { width: 200px; height: 3px; background: var(--border); border-radius: 3px; margin: 16px auto; overflow: hidden; }
    .timer-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 1s linear; }
    .timer-btns { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
    .timer-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px; color: var(--muted2); font-family: 'Space Grotesk', sans-serif; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .timer-btn:hover { color: #fff; border-color: #333; }
    .timer-btn-stop { background: var(--accent-dim); color: var(--accent); border-color: rgba(255,59,107,0.2); }
    .timer-btn-stop:hover { background: rgba(255,59,107,0.2); }
    .ex-timer-btn { cursor: pointer; color: var(--muted); font-size: 0.72rem; opacity: 0.4; transition: opacity 0.2s; }
    .ex-timer-btn:hover { opacity: 1; color: var(--accent); }

    /* ── SHARE / TOAST ── */
    .btn-share { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; font-family: 'Space Grotesk', sans-serif; font-size: 0.84rem; font-weight: 600; cursor: pointer; color: var(--muted2); transition: all 0.2s; }
    .btn-share:hover { color: #fff; border-color: #333; }
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px; font-size: 0.78rem; color: var(--green); font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 150; animation: fadeUp 0.3s ease both; pointer-events: none; }

    /* ── RESULT CARD ANIMATIONS ── */
    @keyframes cardIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    #result-section > .card { animation: cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
    #result-section > .card:nth-child(1) { animation-delay: 0s; }
    #result-section > .card:nth-child(2) { animation-delay: 0.06s; }
    #result-section > .card:nth-child(3) { animation-delay: 0.12s; }
    #result-section > .card:nth-child(4) { animation-delay: 0.18s; }
    #result-section > .card:nth-child(5) { animation-delay: 0.24s; }
    #result-section > .card:nth-child(6) { animation-delay: 0.30s; }
    #result-section > .card:nth-child(7) { animation-delay: 0.36s; }
    #result-section > .card:nth-child(8) { animation-delay: 0.42s; }
    #result-section > .card:nth-child(9) { animation-delay: 0.48s; }
    #result-section > .card:nth-child(n+10) { animation-delay: 0.54s; }

    /* TIPS */
    .tip-item { display: flex; gap: 14px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 0.78rem; color: var(--muted2); line-height: 1.6; }
    .tip-item:last-child { border-bottom: none; }
    .tip-num { font-size: 0.68rem; font-weight: 700; color: var(--pink); flex-shrink: 0; padding-top: 2px; }

    /* RESTART */
    .result-btns { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-restart { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; font-family: 'Space Grotesk', sans-serif; font-size: 0.84rem; font-weight: 600; cursor: pointer; color: var(--muted2); transition: all 0.2s; }
    .btn-restart:hover { color: #fff; border-color: #333; }
    .btn-print { background: var(--accent-dim); border: 1px solid rgba(255,59,107,0.2); border-radius: 10px; padding: 12px 20px; font-family: 'Space Grotesk', sans-serif; font-size: 0.84rem; font-weight: 600; cursor: pointer; color: var(--accent); transition: all 0.2s; }
    .btn-print:hover { background: rgba(255,59,107,0.2); }

    /* ── NAV ── */
    .float-nav {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      z-index: 100; display: flex; align-items: center; gap: 2px;
      background: rgba(10,10,10,0.82);
      backdrop-filter: blur(40px) saturate(2); -webkit-backdrop-filter: blur(40px) saturate(2);
      border: 1px solid rgba(255,255,255,0.07); border-radius: 100px; padding: 5px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
      white-space: nowrap;
    }
    .fn-logo { font-weight: 700; font-size: 0.88rem; letter-spacing: -0.03em; color: #fff; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.06); border-radius: 100px; padding: 7px 13px; }
    .fn-links { display: flex; align-items: center; padding: 0 3px; }
    .fn-link { padding: 7px 13px; border-radius: 100px; font-size: 0.82rem; font-weight: 500; color: rgba(255,255,255,0.38); text-decoration: none; transition: all 0.2s; background: none; border: none; cursor: pointer; font-family: 'Space Grotesk', sans-serif; }
    .fn-link:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.05); }
    .fn-link.active { color: #fff; background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.07); }
    .fn-sep { width: 1px; height: 14px; background: rgba(255,255,255,0.07); margin: 0 2px; flex-shrink: 0; }
    .fn-cta { background: var(--pink); color: #fff; border: none; border-radius: 100px; padding: 8px 16px; font-family: 'Space Grotesk', sans-serif; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; box-shadow: 0 0 16px rgba(255,59,107,0.28); }
    .fn-cta:hover { background: #e0284f; transform: scale(1.04); }

    @media print {
      .float-nav, #quiz-card, .result-btns, .timer-overlay,
      .progress-form-row, .progress-indicator, .ex-swap-icon,
      .ex-info-btn, .warmup-chevron, .deload-hint .btn-dismiss-deload,
      .saved-banner, .ex-timer-btn, .btn-share, .toast { display: none !important; }
      #result-section { display: flex !important; gap: 24px !important; }
      body { padding: 0 !important; background: #fff !important; color: #000 !important; }
      .card { border: 1px solid #ddd !important; break-inside: avoid; background: #fff !important; }
      .card-tag::before { background: #333 !important; }
      .card-tag { color: #333 !important; }
      .ex-table td, .ex-table th { color: #333 !important; }
      .ex-table td:first-child { color: #000 !important; }
      .result-name span, .r-stat-val { color: #333 !important; }
      .result-badge { color: #333 !important; background: #eee !important; border-color: #ccc !important; }
      .result-desc, .r-stat-label, .day-label, .tip-item { color: #555 !important; }
      .day-name { color: #333 !important; }
      .mtag { background: #f0f0f0 !important; border-color: #ddd !important; color: #333 !important; }
      .warmup-list { max-height: 999px !important; display: block !important; }
      .warmup-section { border-bottom: 1px solid #ddd !important; }
      .warmup-item { color: #555 !important; }
      .warmup-item-name { color: #000 !important; }
      .warmup-item-dur { color: #333 !important; }
      .week-day, .tip-item, .ex-table td, .ex-table th { border-color: #ddd !important; }
      .badge-train { background: #eee !important; color: #333 !important; }
      .badge-rest { background: #f5f5f5 !important; color: #999 !important; }
      .tip-num { color: #333 !important; }
      .superset-group td:first-child { border-left-color: #333 !important; }
      .superset-badge { background: #eee !important; color: #333 !important; }
      .result-stats { border-color: #ddd !important; }
      .r-stat { border-color: #ddd !important; }

      splitDesc='Drücken, Ziehen, Beine – klassisch und hocheffektiv. Verwandte Muskeln gemeinsam trainieren, volle Erholungszeit garantiert.';
      schedule=[{day:'Mo',label:'Push – Brust, Schultern, Trizeps',type:'train'},{day:'Di',label:'Pull – Rücken, Bizeps',type:'train'},{day:'Mi',label:'Legs – Beine, Waden',type:'train'},{day:'Do',label:'Ruhetag',type:'rest'},{day:'Fr',label:'Ruhetag',type:'rest'},{day:'Sa',label:'Ruhetag',type:'rest'},{day:'So',label:'Ruhetag',type:'rest'}];
      workouts = isBW
        ? [{title:'Push',sub:'Brust · Schultern · Trizeps',wtype:'upper',exercises:[pushup,pike_pushup,dip,mountain_climber,plank]},
           {title:'Pull',sub:'Rücken · Bizeps',wtype:'upper',exercises:[inverted_row,pullup,superman,mountain_climber,leg_raise]},
           {title:'Legs',sub:'Quads · Gesäß · Waden',wtype:'lower',exercises:[bodyweight_squat,lunges,glute_bridge,jump_squat,hollow_body]}]
        : [{title:'Push',sub:'Brust · Schultern · Trizeps',wtype:'upper',exercises:[bench_press,incline_press,ohp,lateral_raise,cable_fly,tricep_push,face_pull]},
           {title:'Pull',sub:'Rücken · Bizeps',wtype:'upper',exercises:[deadlift,pullup,cable_row,pulldown,barbell_curl,face_pull,ab_wheel]},
           {title:'Legs',sub:'Quads · Hamstrings · Waden',wtype:'lower',exercises:[squat,leg_press,rdl,leg_curl,hip_thrust,calf_raise,plank]}];

    } else if (a.days===4) {
      splitName='Upper / Lower Split';
      splitDesc='Oberkörper und Unterkörper im Wechsel – jeder Muskel zweimal pro Woche mit hohem Volumen. Optimal für Muskelaufbau bei 4 Tagen.';
      schedule=[{day:'Mo',label:'Upper A – Oberkörper Kraft',type:'train'},{day:'Di',label:'Lower A – Unterkörper Kraft',type:'train'},{day:'Mi',label:'Ruhetag',type:'rest'},{day:'Do',label:'Upper B – Oberkörper Volumen',type:'train'},{day:'Fr',label:'Lower B – Unterkörper Volumen',type:'train'},{day:'Sa',label:'Ruhetag',type:'rest'},{day:'So',label:'Ruhetag',type:'rest'}];
      workouts = isBW
        ? [{title:'Upper A',sub:'Kraft Oberkörper',wtype:'upper',exercises:[pushup,inverted_row,pike_pushup,dip,plank]},
           {title:'Lower A',sub:'Kraft Unterkörper',wtype:'lower',exercises:[bodyweight_squat,glute_bridge,lunges,jump_squat,leg_raise]},
           {title:'Upper B',sub:'Volumen Oberkörper',wtype:'upper',exercises:[pushup,inverted_row,dip,pike_pushup,hollow_body]},
           {title:'Lower B',sub:'Volumen Unterkörper',wtype:'lower',exercises:[lunges,glute_bridge,jump_squat,bodyweight_squat,mountain_climber]}]
        : [{title:'Upper A',sub:'Kraft Oberkörper',wtype:'upper',exercises:[bench_press,pullup,ohp,cable_row,barbell_curl,tricep_push,face_pull]},
           {title:'Lower A',sub:'Kraft Unterkörper',wtype:'lower',exercises:[squat,deadlift,hip_thrust,rdl,calf_raise,plank]},
           {title:'Upper B',sub:'Volumen Oberkörper',wtype:'upper',exercises:[incline_press,pulldown,lateral_raise,cable_row,cable_fly,barbell_curl,ab_wheel]},
           {title:'Lower B',sub:'Volumen Unterkörper',wtype:'lower',exercises:[leg_press,leg_curl,hip_thrust,calf_raise,plank,ab_wheel]}];

    } else {
      splitName='Push / Pull / Legs (2×)';
      splitDesc='Jeder Muskel zweimal pro Woche – maximales Volumen und Frequenz. Für Erfahrene die den nächsten Schritt machen wollen.';
      schedule=[{day:'Mo',label:'Push A',type:'train'},{day:'Di',label:'Pull A',type:'train'},{day:'Mi',label:'Legs A',type:'train'},{day:'Do',label:'Ruhetag',type:'rest'},{day:'Fr',label:'Push B',type:'train'},{day:'Sa',label:'Pull B',type:'train'},{day:'So',label:a.days>=5?'Legs B':'Ruhetag',type:a.days>=5?'train':'rest'}];
      workouts = isBW
        ? [{title:'Push A',sub:'Brust · Schultern · Trizeps',wtype:'upper',exercises:[pushup,pike_pushup,dip,mountain_climber,plank]},
           {title:'Pull A',sub:'Rücken · Bizeps',wtype:'upper',exercises:[pullup,inverted_row,superman,mountain_climber,leg_raise]},
           {title:'Legs A',sub:'Quad-Fokus',wtype:'lower',exercises:[bodyweight_squat,jump_squat,lunges,glute_bridge,hollow_body]},
           {title:'Push B',sub:'Schulter-Fokus',wtype:'upper',exercises:[pike_pushup,pushup,dip,mountain_climber,hollow_body]},
           {title:'Pull B',sub:'Volumen Rücken',wtype:'upper',exercises:[inverted_row,pullup,superman,leg_raise,plank]},
           {title:'Legs B',sub:'Posterior-Fokus',wtype:'lower',exercises:[glute_bridge,lunges,jump_squat,bodyweight_squat,leg_raise]}]
        : [{title:'Push A',sub:'Brust · Schultern · Trizeps',wtype:'upper',exercises:[bench_press,ohp,incline_press,lateral_raise,tricep_push,cable_fly,face_pull]},
           {title:'Pull A',sub:'Rücken · Bizeps',wtype:'upper',exercises:[deadlift,pullup,cable_row,face_pull,barbell_curl,ab_wheel]},
           {title:'Legs A',sub:'Quad-Fokus',wtype:'lower',exercises:[squat,leg_press,hip_thrust,calf_raise,plank]},
           {title:'Push B',sub:'Schulter-Fokus',wtype:'upper',exercises:[ohp,incline_press,lateral_raise,cable_fly,tricep_push,face_pull,ab_wheel]},
           {title:'Pull B',sub:'Volumen Rücken',wtype:'upper',exercises:[pulldown,cable_row,rdl,barbell_curl,face_pull,ab_wheel]},
           {title:'Legs B',sub:'Posterior-Fokus',wtype:'lower',exercises:[deadlift,rdl,leg_curl,hip_thrust,calf_raise,plank]}];
    }

    const exCount = a.time==='short'?5:a.time==='medium'?6:a.time==='long'?7:8;
    workouts = workouts.map(w=>({...w,exercises:w.exercises.slice(0,exCount).map(ex=>{
      if(!ex) return ex; let e={...ex};
      if(a.goal==='strength'){e.sets=String(parseInt(e.sets)+1);e.reps='4–6';e.rest='2–3min';}
      if(a.goal==='fat'){e.rest='45–60s';}
      return e;
    })}));

    // Apply injury replacements
    const injuries = (a.injury || []).filter(v => v !== 'none');
    if (injuries.length > 0) {
      workouts = workouts.map(w => ({...w, exercises: w.exercises.map(ex => {
        if (!ex) return ex;
        for (const inj of injuries) {
          const rule = INJURY_REPLACE[inj];
          if (rule && rule.avoid.includes(ex.key)) {
            const replKey = rule.map[ex.key];
            if (replKey && EX[replKey]) {
              let repl = {...EX[replKey]};
              if(a.goal==='strength'){repl.sets=String(parseInt(repl.sets)+1);repl.reps='4–6';repl.rest='2–3min';}
              if(a.goal==='fat'){repl.rest='45–60s';}
              return repl;
            }
          }
        }
        return ex;
      })}));
    }

    // Mark supersets for advanced users
    if (a.level === 'advanced') {
      workouts = workouts.map(w => {
        const exs = w.exercises;
        let groupId = 0;
        for (let i = 0; i < exs.length - 1; i++) {
          if (!exs[i] || !exs[i+1]) continue;
          const pair = SUPERSET_PAIRS[exs[i].key];
          if (pair === exs[i+1].key) {
            groupId++;
            exs[i] = {...exs[i], supersetGroup: groupId};
            exs[i+1] = {...exs[i+1], supersetGroup: groupId};
          }
        }
        return {...w, exercises: exs};
      });
    }

    // Rotate schedule to start on chosen weekday
    const WEEK_DAYS = ['Mo','Di','Mi','Do','Fr','Sa','So'];
    const startIdx = WEEK_DAYS.indexOf(a.weekStart || 'Mo');
    if (startIdx > 0) {
      const rotDays = [...WEEK_DAYS.slice(startIdx), ...WEEK_DAYS.slice(0, startIdx)];
      schedule = schedule.map((item, i) => ({ ...item, day: rotDays[i] }));
    }

    const repsLabel = a.goal==='strength'?'4–6 Wdh.':a.goal==='fat'?'12–20 Wdh.':a.goal==='muscle'?'8–12 Wdh.':'10–15 Wdh.';
    const freqPerWeek = schedule.filter(d=>d.type==='train').length;
    const volLabel = a.time==='short'?'<45 Min.':a.time==='medium'?'45–60 Min.':a.time==='long'?'60–90 Min.':'90+ Min.';

    const _diet = (() => { try { return JSON.parse(localStorage.getItem('fitti_data') || '{}').diet || 'normal'; } catch(e) { return 'normal'; } })();
    const proteinTip = _diet === 'vegan'
      ? (a.goal==='muscle'||a.goal==='strength'
          ? 'Als Veganer: Setze auf Tofu, Tempeh, Hülsenfrüchte, Seitan und veganes Proteinpulver. Kombiniere pflanzliche Quellen für alle Aminosäuren. Ziel: 1,8–2,2 g/kg.'
          : a.goal==='fat'
          ? 'Pflanzliches Protein schützt deine Muskeln beim Abnehmen. Hülsenfrüchte, Tempeh und veganes Proteinpulver helfen dir, mindestens 2 g/kg täglich zu erreichen.'
          : 'Achte als Veganer besonders auf vollständige Proteinversorgung: Tofu, Tempeh, Hülsenfrüchte und veganes Proteinpulver kombinieren. Ziel: 1,4 g/kg täglich.')
      : _diet === 'vegetarisch'
      ? (a.goal==='muscle'||a.goal==='strength'
          ? 'Als Vegetarier: Quark, Hüttenkäse, Eier, Hülsenfrüchte und Milchprodukte sind deine besten Proteinquellen. Ziel: 1,8–2,2 g/kg.'
          : a.goal==='fat'
          ? 'Protein schützt deine Muskeln beim Abnehmen. Als Vegetarier: Eier, Magerquark, Hüttenkäse und Hülsenfrüchte für mindestens 2 g/kg täglich.'
          : 'Als Vegetarier: Kombiniere Eier, Milchprodukte und Hülsenfrüchte für mindestens 1,4 g Protein/kg täglich.')
      : (a.goal==='muscle'||a.goal==='strength'
          ? 'Iss 1,8–2,2 g Protein pro kg Körpergewicht täglich plus einen leichten Kalorienüberschuss von 200–300 kcal.'
          : a.goal==='fat'
          ? 'Halte ein Kaloriendefizit von 300–500 kcal/Tag und iss mindestens 2 g Protein/kg um Muskeln zu erhalten.'
          : 'Achte auf min. 1,4 g Protein/kg täglich für Muskelerhalt und Regeneration.');
    const tips=[
      'Progressive Überlastung – erhöhe Gewicht oder Wiederholungen jede Woche minimal. Das ist das Fundament jedes Fortschritts.',
      'Schlaf ist dein wichtigstes Supplement – 7–9 Stunden pro Nacht für optimale Muskelregeneration.',
      proteinTip,
      '5–10 Minuten Aufwärmen vor jedem Training – Mobilität, Kreislauf und Verletzungsschutz.',
      'Führe ein Trainingstagebuch. Gewichte und Wiederholungen tracken ist der einfachste Weg um Fortschritt sichtbar zu machen.',
    ];
    if(a.level==='beginner') tips.push('Lerne als Anfänger zuerst die korrekte Technik bevor du Gewichte steigerst. Saubere Ausführung schützt vor Verletzungen.');

    return {splitName,splitDesc,schedule,workouts,repsLabel,freqPerWeek,volLabel,tips};
  }

  // ── QUIZ STATE ───────────────────────────────────────────────────────────────
  let currentQ = 0;
  const answers = {};

  function renderQuestion() {
    const q = QUESTIONS[currentQ];
    const pct = Math.round((currentQ / QUESTIONS.length) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = q.num;
    document.getElementById('progress-pct').textContent = pct + '%';
    const isMulti = q.type === 'multi', isLast = currentQ === QUESTIONS.length - 1;
    const selected = answers[q.id] || (isMulti ? [] : null);
    const optHtml = (isMulti
      ? `<p class="multi-hint">Mehrfachauswahl (max. ${q.max})</p><div class="options-grid options-grid-2">`
      : q.grid2 ? `<div class="options-grid options-grid-2">` : `<div class="options-grid">`)
      + q.options.map(o => {
        const sel = isMulti ? selected.includes(o.value) : selected === o.value;
        return `<button class="option-btn${sel ? ' selected' : ''}" data-value="${o.value}" onclick="selectOption('${q.id}','${o.value}',${isMulti},${q.max || 1})">
          <span class="option-icon">${o.icon}</span>
          <div><div class="option-label">${o.label}</div>${o.desc ? `<div class="option-desc">${o.desc}</div>` : ''}</div>
        </button>`;
      }).join('') + '</div>';
    const hasAns = isMulti ? (selected.length > 0) : !!selected;
    document.getElementById('question-card').innerHTML = `
      <div class="question-wrap">
        <div class="q-text">${q.text}</div>
        <div class="q-hint">${q.hint}</div>
        ${optHtml}
        <div class="nav-btns">
          <button class="btn-back" onclick="goBack()" ${currentQ === 0 ? 'style="visibility:hidden"' : ''}>← Zurück</button>
          <button class="btn-next${hasAns ? ' ready' : ''}${isLast && hasAns ? ' generate' : ''}" onclick="goNext()">
            ${isLast ? 'Trainingsplan erstellen →' : 'Weiter →'}
          </button>
        </div>
      </div>`;
  }

  function selectOption(qId, value, isMulti, max) {
    const q = QUESTIONS.find(q => q.id === qId);
    let autoAdvance = false;

    if (isMulti) {
      let a = answers[qId] || [];
      if (q && q.exclusive) {
        if (value === q.exclusive) {
          a = [value];
          autoAdvance = true;
        } else {
          a = a.filter(v => v !== q.exclusive);
          a.includes(value) ? a = a.filter(v => v !== value) : a.length < max && (a = [...a, value]);
        }
      } else {
        a.includes(value) ? a = a.filter(v => v !== value) : a.length < max && (a = [...a, value]);
      }
      answers[qId] = a;
      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.classList.toggle('selected', a.includes(btn.dataset.value));
      });
      const hasAns = a.length > 0;
      const weiter = document.querySelector('.btn-next');
      if (weiter) {
        weiter.classList.toggle('ready', hasAns);
        weiter.classList.toggle('generate', hasAns && currentQ === QUESTIONS.length - 1);
      }
    } else {
      answers[qId] = value;
      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.value === value);
      });
      const weiter = document.querySelector('.btn-next');
      if (weiter) {
        weiter.classList.add('ready');
        if (currentQ === QUESTIONS.length - 1) weiter.classList.add('generate');
      }
      autoAdvance = true;
    }

    if (autoAdvance) setTimeout(goNext, 180);
  }

  function goNext() {
    const q = QUESTIONS[currentQ], ans = answers[q.id];
    if (!ans || (Array.isArray(ans) && ans.length === 0)) return;
    if (currentQ < QUESTIONS.length - 1) { currentQ++; renderQuestion(); }
    else showResult();
  }

  function goBack() {
    if (currentQ > 0) { currentQ--; renderQuestion(); }
  }

  // ── PROGRESSION TRACKER ────────────────────────────────────────────────────
  function loadProgress() {
    return JSON.parse(localStorage.getItem('fitti_training_progress') || '{}');
  }

  function saveProgressEntry(exKey, weight, reps) {
    const data = loadProgress();
    if (!data[exKey]) data[exKey] = [];
    data[exKey].push({ date: new Date().toISOString().slice(0,10), weight, reps });
    if (data[exKey].length > 20) data[exKey] = data[exKey].slice(-20);
    localStorage.setItem('fitti_training_progress', JSON.stringify(data));
  }

  function getProgressIndicator(exKey) {
    const data = loadProgress();
    const entries = data[exKey];
    if (!entries || entries.length === 0) return '';
    const last = entries[entries.length - 1];
    return `<span class="progress-indicator" title="Letztes Training: ${last.weight}kg × ${last.reps}">↑ ${last.weight}kg</span>`;
  }

  function getProgressHistory(exKey) {
    const data = loadProgress();
    const entries = (data[exKey] || []).slice(-3).reverse();
    if (entries.length === 0) return '<span style="color:var(--muted)">Noch keine Einträge</span>';
    return entries.map(e => `${e.date}: ${e.weight}kg × ${e.reps} Wdh.`).join('<br>');
  }

  // ── TIMER ──────────────────────────────────────────────────────────────────
  let timerInterval = null, timerTotal = 0, timerRemaining = 0;

  function parseRestTime(rest) {
    if (!rest) return 60;
    const s = rest.replace(/\s/g,'');
    if (s.includes('–')) {
      const parts = s.replace('min','').replace('s','').split('–');
      return Math.round((parseFloat(parts[0]) + parseFloat(parts[1])) / 2) * (s.includes('min') ? 60 : 1);
    }
    if (s.includes('min')) return parseFloat(s) * 60;
    return parseInt(s) || 60;
  }

  function formatTime(secs) {
    const m = Math.floor(secs / 60), s = secs % 60;
    return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }

  function startTimer(seconds) {
    timerTotal = seconds; timerRemaining = seconds;
    const overlay = document.getElementById('timer-overlay');
    overlay.classList.add('active');
    updateTimerDisplay();
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timerRemaining--;
      updateTimerDisplay();
      if (timerRemaining <= 0) {
        clearInterval(timerInterval); timerInterval = null;
        // Beep + vibrate
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.value = 880;
          osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.3);
        } catch(e) {}
        if (navigator.vibrate) navigator.vibrate([200,100,200]);
        setTimeout(stopTimer, 2000);
      }
    }, 1000);
  }

  function updateTimerDisplay() {
    document.getElementById('timer-display').textContent = formatTime(Math.max(0, timerRemaining));
    const pct = timerTotal > 0 ? ((timerTotal - timerRemaining) / timerTotal * 100) : 0;
    document.getElementById('timer-fill').style.width = pct + '%';
  }

  function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    document.getElementById('timer-overlay').classList.remove('active');
  }

  function timerAddTime(delta) {
    timerRemaining = Math.max(0, timerRemaining + delta);
    timerTotal = Math.max(timerTotal, timerRemaining);
    updateTimerDisplay();
  }

  // ── SWAP ───────────────────────────────────────────────────────────────────
  let activeSwapDropdown = null;

  function showSwapDropdown(wIdx, eIdx, btnEl) {
    closeSwapDropdown();
    const ex = currentPlan.workouts[wIdx].exercises[eIdx];
    if (!ex) return;
    const alts = (EX_ALTS[ex.key] || []).filter(k => {
      // Filter out exercises that are avoided due to injuries
      const injuries = (answers.injury || []).filter(v => v !== 'none');
      for (const inj of injuries) {
        if (INJURY_REPLACE[inj] && INJURY_REPLACE[inj].avoid.includes(k)) return false;
      }
      return true;
    });
    if (alts.length === 0) return;

    const dd = document.createElement('div');
    dd.className = 'swap-dropdown';
    dd.innerHTML = alts.map(k => `
      <div class="swap-option" onclick="doSwap(${wIdx},${eIdx},'${k}')">
        <span>${EX[k].name}</span>
        <span class="swap-option-muscles">${EX[k].muscles.join(', ')}</span>
      </div>`).join('');
    btnEl.closest('.ex-name-wrap').appendChild(dd);
    activeSwapDropdown = dd;
  }

  function closeSwapDropdown() {
    if (activeSwapDropdown) { activeSwapDropdown.remove(); activeSwapDropdown = null; }
  }

  function doSwap(wIdx, eIdx, newKey) {
    closeSwapDropdown();
    let newEx = {...EX[newKey]};
    if (answers.goal === 'strength') { newEx.sets = String(parseInt(newEx.sets)+1); newEx.reps = '4–6'; newEx.rest = '2–3min'; }
    if (answers.goal === 'fat') { newEx.rest = '45–60s'; }
    currentPlan.workouts[wIdx].exercises[eIdx] = newEx;
    // Save swaps
    const swaps = JSON.parse(localStorage.getItem('fitti_training_swaps') || '{}');
    swaps[`${wIdx}_${eIdx}`] = newKey;
    localStorage.setItem('fitti_training_swaps', JSON.stringify(swaps));
    showResult(true);
  }

  // ── DELOAD ─────────────────────────────────────────────────────────────────
  function checkDeload() {
    const start = localStorage.getItem('fitti_training_start_date');
    if (!start) { localStorage.setItem('fitti_training_start_date', String(Date.now())); return null; }
    const weeks = Math.floor((Date.now() - parseInt(start)) / (7*24*60*60*1000));
    const dismissed = localStorage.getItem('fitti_deload_dismissed_at');
    if (dismissed && (Date.now() - parseInt(dismissed)) < 7*24*60*60*1000) return null;
    if (weeks >= 4) return weeks;
    return null;
  }

  function dismissDeload() {
    localStorage.setItem('fitti_deload_dismissed_at', String(Date.now()));
    const el = document.getElementById('deload-card');
    if (el) el.style.display = 'none';
  }

  // ── SHARE ──────────────────────────────────────────────────────────────────
  function generateShareURL() {
    const levelMap = {beginner:'b',intermediate:'i',advanced:'a'};
    const goalMap = {muscle:'m',strength:'s',fat:'f',fitness:'t'};
    const eqMap = {gym:'g',home_eq:'h',bodyweight:'b'};
    const timeMap = {short:'s',medium:'m',long:'l',xlong:'x'};
    const data = {
      l: levelMap[answers.level]||'', d: answers.days||'',
      g: goalMap[answers.goal]||'', e: eqMap[answers.equipment]||'',
      t: timeMap[answers.time]||'',
      w: (answers.weakness||[]).join(','),
      i: (answers.injury||[]).join(','),
    };
    return window.location.origin + window.location.pathname + '#s=' + btoa(JSON.stringify(data));
  }

  function parseShareURL() {
    const hash = window.location.hash;
    if (!hash.startsWith('#s=')) return null;
    try {
      const data = JSON.parse(atob(hash.slice(3)));
      const levelRev = {b:'beginner',i:'intermediate',a:'advanced'};
      const goalRev = {m:'muscle',s:'strength',f:'fat',t:'fitness'};
      const eqRev = {g:'gym',h:'home_eq',b:'bodyweight'};
      const timeRev = {s:'short',m:'medium',l:'long',x:'xlong'};
      return {
        level: levelRev[data.l], days: parseInt(data.d),
        goal: goalRev[data.g], equipment: eqRev[data.e],
        time: timeRev[data.t],
        weakness: data.w ? data.w.split(',') : [],
        injury: data.i ? data.i.split(',') : ['none'],
      };
    } catch(e) { return null; }
  }

  async function sharePlan() {
    const url = generateShareURL();
    const text = `Mein ${currentPlan.splitName} – erstellt mit Fitti`;
    if (navigator.share) {
      try { await navigator.share({ title: 'Mein Fitti Trainingsplan', text, url }); } catch(e) {}
    } else {
      try {
        await navigator.clipboard.writeText(url);
        showToast('Link kopiert!');
      } catch(e) {}
    }
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 2000);
  }

  // ── NUTRITION CARD (from Essensplan data) ─────────────────────────────────────
  function getNutritionCard() {
    const raw = localStorage.getItem('fitti_data');
    if (!raw) return `
      <div class="card">
        <div class="card-body" style="padding-top:14px">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
            <div>
              <div style="font-size:0.82rem;font-weight:600;margin-bottom:4px">Persönliche Kalorienziele</div>
              <div style="font-size:0.74rem;color:var(--muted2);line-height:1.6">Fülle den Ernährungsrechner aus um genaue<br>Kalorienempfehlungen für Trainings- und Ruhetage zu sehen.</div>
            </div>
            <a href="index.html" style="background:var(--accent-dim);border:1px solid rgba(255,59,107,0.2);border-radius:10px;padding:10px 16px;font-family:'Space Grotesk',sans-serif;font-size:0.8rem;font-weight:600;text-decoration:none;color:var(--accent);white-space:nowrap;flex-shrink:0">Ernährungsprofil →</a>
          </div>
        </div>
      </div>`;
    try {
      const d = JSON.parse(raw);
      const age = parseFloat(d.age), ht = parseFloat(d.height), wt = parseFloat(d.weight);
      if (!age || !ht || !wt) return '';
      const bmr = d.gender === 'male'
        ? 88.362 + 13.397 * wt + 4.799 * ht - 5.677 * age
        : 447.593 + 9.247 * wt + 3.098 * ht - 4.330 * age;
      const tdee = Math.round(bmr * (parseFloat(d.activity) || 1.375));
      const goal = answers.goal;
      let trainKcal, restKcal, protG;
      if (goal === 'muscle' || goal === 'strength') {
        trainKcal = tdee + 350; restKcal = tdee + 100; protG = Math.round(wt * 2.0);
      } else if (goal === 'fat') {
        trainKcal = Math.max(tdee - 200, Math.round(bmr * 1.1));
        restKcal = Math.max(tdee - 500, Math.round(bmr * 1.05));
        protG = Math.round(wt * 2.2);
      } else {
        trainKcal = tdee; restKcal = tdee - 100; protG = Math.round(wt * 1.5);
      }
      return `
        <div class="card">
          <div class="card-header"><span class="card-tag">Ernährung für deinen Plan</span></div>
          <div class="card-body" style="padding-top:14px">
            <div style="display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px">
              <div style="padding:14px 16px;border-right:1px solid var(--border)">
                <div style="font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted2);font-weight:600;margin-bottom:5px">Trainingstag</div>
                <div style="font-size:1.3rem;font-weight:700;letter-spacing:-0.04em;color:var(--accent)">${trainKcal}</div>
                <div style="font-size:0.7rem;color:var(--muted2);margin-top:2px">kcal empfohlen</div>
              </div>
              <div style="padding:14px 16px">
                <div style="font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted2);font-weight:600;margin-bottom:5px">Ruhetag</div>
                <div style="font-size:1.3rem;font-weight:700;letter-spacing:-0.04em;color:var(--muted2)">${restKcal}</div>
                <div style="font-size:0.7rem;color:var(--muted2);margin-top:2px">kcal empfohlen</div>
              </div>
            </div>
            <div style="padding:10px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:space-between;font-size:0.8rem;margin-bottom:10px">
              <span style="color:var(--muted2)">Tägliches Protein</span>
              <strong style="color:var(--accent)">${protG}g / Tag</strong>
            </div>
            <a href="index.html" style="display:block;text-align:center;font-size:0.74rem;color:var(--muted2);text-decoration:none;padding:4px 0">Essensplan & Kalorienbedarf ansehen →</a>
          </div>
        </div>`;
    } catch(e) { return ''; }
  }

  // ── RESULT ────────────────────────────────────────────────────────────────────
  function showResult(noScroll=false) {
    const plan = currentPlan || generatePlan(answers);
    currentPlan = plan;
    document.getElementById('quiz-card').style.display = 'none';

    // Apply saved swaps
    if (!noScroll) {
      const swaps = JSON.parse(localStorage.getItem('fitti_training_swaps') || '{}');
      for (const [key, exKey] of Object.entries(swaps)) {
        const [wIdx, eIdx] = key.split('_').map(Number);
        if (plan.workouts[wIdx] && plan.workouts[wIdx].exercises[eIdx] && EX[exKey]) {
          let newEx = {...EX[exKey]};
          if (answers.goal === 'strength') { newEx.sets = String(parseInt(newEx.sets)+1); newEx.reps = '4–6'; newEx.rest = '2–3min'; }
          if (answers.goal === 'fat') { newEx.rest = '45–60s'; }
          plan.workouts[wIdx].exercises[eIdx] = newEx;
        }
      }
    }

    const weekHtml = plan.schedule.map(d => `
      <div class="week-day" data-type="${d.type}">
        <div class="day-name">${d.day}</div>
        <div class="day-label">${d.label}</div>
        <span class="day-badge ${d.type === 'train' ? 'badge-train' : 'badge-rest'}">${d.type === 'train' ? 'Training' : 'Ruhe'}</span>
      </div>`).join('');

    const workoutsHtml = plan.workouts.map((w, wIdx) => {
      const warmupType = w.wtype || 'full';
      const warmups = WARMUPS[warmupType] || WARMUPS.full;
      const warmupHtml = `
        <div class="warmup-section">
          <button class="warmup-toggle" onclick="this.parentElement.classList.toggle('open')">
            Aufwärmen (5 Min.) <span class="warmup-chevron">▸</span>
          </button>
          <div class="warmup-list">
            ${warmups.map(wu => `<div class="warmup-item"><span class="warmup-item-name">${wu.name}</span><span class="warmup-item-dur">${wu.dur}</span></div>`).join('')}
          </div>
        </div>`;

      const exerciseRows = w.exercises.filter(Boolean).map((ex, eIdx) => {
        const desc = EX_DESC[ex.key] || '';
        const progInd = getProgressIndicator(ex.key);
        const isSuperset = ex.supersetGroup ? ' superset-group' : '';
        const superBadge = ex.supersetGroup && !w.exercises[eIdx-1]?.supersetGroup ? `<span class="superset-badge">Superset</span>` : '';
        return `
          <tr class="${isSuperset}" data-w="${wIdx}" data-e="${eIdx}">
            <td>
              <span class="ex-name-wrap">
                <span><span class="ex-num">${eIdx + 1}</span>${ex.name}${superBadge}</span>
                ${progInd}
                <span class="ex-info-btn" onclick="event.stopPropagation();this.closest('tr').nextElementSibling.classList.toggle('open')" title="Technik-Tipp">ⓘ</span>
                <span class="ex-swap-icon" onclick="event.stopPropagation();showSwapDropdown(${wIdx},${eIdx},this)" title="Übung tauschen">⇄</span>
              </span>
            </td>
            <td><strong>${ex.sets} × ${ex.reps}</strong></td>
            <td>${ex.rest} <span class="ex-timer-btn" onclick="startTimer(parseRestTime('${ex.rest}'))" title="Timer starten">⏱</span></td>
            <td>${ex.muscles.map(m => `<span class="mtag">${m}</span>`).join('')}</td>
          </tr>
          <tr class="ex-desc-row"><td colspan="4">${desc}</td></tr>`;
      }).join('');

      return `
      <div class="card">
        <div class="card-header"><span class="card-tag">${w.title}</span></div>
        <div class="card-body" style="padding-top:14px">
          ${warmupHtml}
          <div class="ex-title">${w.sub}</div>
          <table class="ex-table">
            <thead><tr><th>#&nbsp; Übung</th><th>Sätze × Wdh.</th><th>Pause</th><th>Muskeln</th></tr></thead>
            <tbody>${exerciseRows}</tbody>
          </table>
        </div>
      </div>`;
    }).join('');

    const nutritionCard = getNutritionCard();

    const tipsHtml = plan.tips.map((t, i) => `
      <div class="tip-item">
        <div class="tip-num">${String(i + 1).padStart(2, '0')}</div>
        <div>${t}</div>
      </div>`).join('');

    // Deload check
    const deloadWeeks = checkDeload();
    const deloadHtml = deloadWeeks ? `
      <div class="card deload-hint" id="deload-card">
        <div class="card-body">
          <div class="deload-body">
            <span style="font-size:1.2rem">⏸️</span>
            <div class="deload-text">
              <h4>Deload-Woche empfohlen</h4>
              <p>Du trainierst seit ${deloadWeeks} Wochen. Reduziere diese Woche Gewicht und Volumen um 40–50% für bessere Erholung und langfristigen Fortschritt.</p>
            </div>
            <button class="btn-dismiss-deload" onclick="dismissDeload()">✕</button>
          </div>
        </div>
      </div>` : '';

    const resultEl = document.getElementById('result-section');
    resultEl.innerHTML = `
      <div class="card">
        <div class="card-body">
          <div class="result-badge">Dein persönlicher Plan</div>
          <div class="result-name">${plan.splitName.includes('/') ? plan.splitName.replace('/', '<span>/</span>') : plan.splitName}</div>
          <div class="result-desc">${plan.splitDesc}</div>
          <div class="result-stats">
            <div class="r-stat"><div class="r-stat-val">${plan.freqPerWeek}×</div><div class="r-stat-label">pro Woche</div></div>
            <div class="r-stat"><div class="r-stat-val" style="font-size:1rem;margin-top:4px">${plan.volLabel}</div><div class="r-stat-label">pro Einheit</div></div>
            <div class="r-stat"><div class="r-stat-val" style="font-size:1rem;margin-top:4px">${plan.repsLabel}</div><div class="r-stat-label">Wiederholungen</div></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-tag">Wochenplan</span></div>
        <div class="card-body" style="padding-top:14px">
          <div class="week-grid">${weekHtml}</div>
        </div>
      </div>
      ${workoutsHtml}
      ${deloadHtml}
      ${nutritionCard}
      <div class="card">
        <div class="card-header"><span class="card-tag">Tipps für deinen Erfolg</span></div>
        <div class="card-body" style="padding-top:14px">${tipsHtml}</div>
      </div>
      <div class="card">
        <div class="card-body">
          <div class="result-btns">
            <button class="btn-restart" onclick="editTraining()">Neu starten</button>
            <button class="btn-print" onclick="window.print()">Plan drucken</button>
            <button class="btn-share" onclick="sharePlan()">Teilen</button>
          </div>
        </div>
      </div>`;

    // Add click handlers for progression tracking
    resultEl.querySelectorAll('tr[data-w]').forEach(tr => {
      tr.addEventListener('click', (e) => {
        if (e.target.closest('.ex-info-btn,.ex-swap-icon,.ex-timer-btn,.swap-dropdown,.progress-indicator')) return;
        const wIdx = parseInt(tr.dataset.w), eIdx = parseInt(tr.dataset.e);
        const ex = currentPlan.workouts[wIdx]?.exercises[eIdx];
        if (!ex) return;
        // Find or create progress form row
        let formRow = tr.parentElement.querySelector(`.progress-form-row[data-exkey="${ex.key}"]`);
        if (!formRow) {
          formRow = document.createElement('tr');
          formRow.className = 'progress-form-row';
          formRow.dataset.exkey = ex.key;
          formRow.innerHTML = `<td colspan="4">
            <div class="progress-form">
              <input type="number" placeholder="kg" class="pf-input pf-weight" step="0.5">
              <span style="color:var(--muted)">×</span>
              <input type="number" placeholder="Wdh" class="pf-input pf-reps">
              <button class="pf-save">✓</button>
            </div>
            <div class="progress-history">${getProgressHistory(ex.key)}</div>
          </td>`;
          // Insert after description row
          const descRow = tr.nextElementSibling;
          if (descRow) descRow.after(formRow);
          else tr.after(formRow);
          formRow.querySelector('.pf-save').addEventListener('click', () => {
            const w = parseFloat(formRow.querySelector('.pf-weight').value);
            const r = parseInt(formRow.querySelector('.pf-reps').value);
            if (!w || !r) return;
            saveProgressEntry(ex.key, w, r);
            formRow.classList.remove('open');
            showResult(true);
          });
        }
        formRow.classList.toggle('open');
      });
    });

    saveTrainingAnswers();
    resultEl.style.display = 'flex';
    if (!noScroll) setTimeout(() => resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }

  // ── SAVE / RESTORE ────────────────────────────────────────────────────────────
  const TRAINING_SAVE_KEY = 'fitti_training_answers';

  function saveTrainingAnswers() {
    const data = {
      answers: { ...answers },
      savedTs: Date.now(),
      savedAt: new Date().toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })
             + ' · ' + new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) + ' Uhr'
    };
    localStorage.setItem(TRAINING_SAVE_KEY, JSON.stringify(data));
    // Sync actual chosen goal/level/days back to prefill so index.html reflects correct values
    try {
      const prefill = JSON.parse(localStorage.getItem('fitti_training_prefill') || '{}');
      if (answers.goal)  prefill.goal  = answers.goal;
      if (answers.level) prefill.level = answers.level;
      if (answers.days)  prefill.days  = answers.days;
      localStorage.setItem('fitti_training_prefill', JSON.stringify(prefill));
    } catch(e) {}
    const banner = document.getElementById('saved-banner-training');
    document.getElementById('saved-date-training').textContent = data.savedAt;
    banner.style.display = 'flex';
  }

  function restoreTrainingAnswers() {
    const raw = localStorage.getItem(TRAINING_SAVE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    Object.assign(answers, d.answers);
    // Backwards compat: add default injury if missing
    if (!answers.injury) answers.injury = ['none'];
    const banner = document.getElementById('saved-banner-training');
    document.getElementById('saved-date-training').textContent = d.savedAt || '';
    banner.style.display = 'flex';
    return true;
  }

  function editTraining() {
    document.getElementById('saved-banner-training').style.display = 'none';
    document.getElementById('result-section').style.display = 'none';
    document.getElementById('result-section').innerHTML = '';
    document.getElementById('quiz-card').style.display = 'block';
    document.getElementById('progress-fill').style.width = '0%';
    currentQ = 0; currentPlan = null;
    Object.keys(answers).forEach(k => delete answers[k]);
    localStorage.removeItem('fitti_prefill_shown');
    localStorage.removeItem('fitti_training_swaps');
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── GENDER COLOR ──────────────────────────────────────────────────────────────
  function applyGenderColor() {
    const saved = localStorage.getItem('fitti_data');
    const root = document.documentElement;
    const gender = saved ? (JSON.parse(saved).gender || 'female') : 'female';
    if (gender === 'male') {
      root.style.setProperty('--accent', '#3b82f6');
      root.style.setProperty('--accent-dim', 'rgba(59,130,246,0.12)');
    } else {
      root.style.setProperty('--accent', '#ff3b6b');
      root.style.setProperty('--accent-dim', 'rgba(255,59,107,0.1)');
    }
  }

  // ── PREFILL FROM ESSENSPLAN ───────────────────────────────────────────────────
  function applyPrefill() {
    const raw = localStorage.getItem('fitti_training_prefill');
    if (!raw) return 0;
    const p = JSON.parse(raw);
    let skipped = 0;
    if (p.level) { answers['level'] = p.level; skipped++; }
    if (p.days)  { answers['days']  = p.days;  skipped++; }
    if (p.goal)  { answers['goal']  = p.goal;  skipped++; }
    if (skipped > 0) currentQ = skipped;
    return skipped;
  }

  // ── GLOBAL CLICK HANDLER ──────────────────────────────────────────────────
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.swap-dropdown') && !e.target.closest('.ex-swap-icon')) {
      closeSwapDropdown();
    }
  });

  // ── INIT ──────────────────────────────────────────────────────────────────────
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

  window.addEventListener('DOMContentLoaded', () => {
    window.scrollTo(0, 0);
    applyGenderColor();

    // Handle ?new=1 — reset and start fresh quiz (from "Neu erstellen" button on index.html)
    if (new URLSearchParams(location.search).get('new') === '1') {
      localStorage.removeItem(TRAINING_SAVE_KEY);
      localStorage.removeItem('fitti_training_swaps');
      localStorage.removeItem('fitti_prefill_shown');
      history.replaceState(null, '', location.pathname);
    }

    // Check for share URL
    const shared = parseShareURL();
    if (shared) {
      Object.assign(answers, shared);
      document.getElementById('quiz-card').style.display = 'none';
      showResult();
      return;
    }

    const hadSavedPlan = restoreTrainingAnswers();
    if (hadSavedPlan && Object.keys(answers).length >= 6) {
      document.getElementById('quiz-card').style.display = 'none';
      showResult(true);
    } else {
      const prefillCount = applyPrefill();
      renderQuestion();

      // Prefill notice
      if (prefillCount > 0 && !localStorage.getItem('fitti_prefill_shown')) {
        localStorage.setItem('fitti_prefill_shown', '1');
        const card = document.getElementById('quiz-card');
        const notice = document.createElement('div');
        notice.style.cssText = 'margin:0 16px 12px;padding:9px 13px;background:rgba(59,130,246,0.07);border:1px solid rgba(59,130,246,0.15);border-radius:8px;font-size:0.72rem;color:var(--muted2);line-height:1.5;transition:opacity 0.4s,transform 0.4s,max-height 0.4s,margin 0.4s,padding 0.4s;overflow:hidden;max-height:80px';
        notice.innerHTML = `✓ <strong style="color:rgba(255,255,255,0.7)">${prefillCount} Antworten</strong> aus deinem Ernährungsprofil übernommen.`;
        card.insertBefore(notice, card.firstChild);
        setTimeout(() => {
          notice.style.opacity = '0'; notice.style.transform = 'translateY(-16px)';
          notice.style.maxHeight = '0'; notice.style.margin = '0'; notice.style.padding = '0';
          setTimeout(() => notice.remove(), 450);
        }, 5000);
      }
    }
  });

  // ── SERVICE WORKER ────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
<script>
(function() {
  const KEY = 'fitti_stats', PAGE = 'trainingsplan';
  const stats = JSON.parse(localStorage.getItem(KEY) || '{}');
  if (!stats[PAGE]) stats[PAGE] = { visits: 0, totalTime: 0, lastVisit: null };
  stats[PAGE].visits++;
  stats[PAGE].lastVisit = new Date().toISOString();
  localStorage.setItem(KEY, JSON.stringify(stats));
  let t0 = Date.now();
  function save() {
    const elapsed = Math.round((Date.now() - t0) / 1000);
    if (elapsed <= 0) return;
    t0 = Date.now();
    const s = JSON.parse(localStorage.getItem(KEY) || '{}');
    if (!s[PAGE]) s[PAGE] = { visits: 0, totalTime: 0, lastVisit: null };
    s[PAGE].totalTime = (s[PAGE].totalTime || 0) + elapsed;
    localStorage.setItem(KEY, JSON.stringify(s));
  }
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) save(); else t0 = Date.now();
  });
  window.addEventListener('beforeunload', save);
})();
</script>
</body>
</html>
